	<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <title>Registrate | Detalles con Corazon</title>

<body>
	<section class="form-container">
		<div class="logo-container">
			<img src="../assets/logo.png" alt="logo" class="logo">
			<p class="logoName">Detalles con Corazon</p>
		</div>
		<h1 class="title">My account</h1>
		<form action="../php/registerUser.php" method="post" class="form">
			<div>
				<label for="name" class="label">Name</label>
				<input type="text" id="name" placeholder="Ramsés Anceno" class="input input-name">

				<label for="email" class="label">Email address</label>
				<input type="email" id="email" placeholder="ramses.social0@gmail.com" class="input input-email">

				<label for="password" class="label">Password</label>
				<input type="password" id="password" placeholder="*********" class="input input-password">
			</div>

			<input type="submit" value="Create" class="primary-button login-button">
		</form>
		<p class="account">
			<span>Ya tienes una cuenta?</span>
			<a href="../login/">Inicia sesion</a>
		</p>
	</section>
</body>
